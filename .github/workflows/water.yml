name: Refresh water quality data

on:
  schedule:
    - cron: '35 5,11,17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python update_water.py
      - run: |
          if [ -n "$(git status --porcelain water.json)" ]; then
            git config user.name "dublin-bay-bot"
            git config user.email "actions@users.noreply.github.com"
            git add water.json
            git commit -m "Refresh water quality data"
            git push
          fi
